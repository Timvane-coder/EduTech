<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL 3D Network Map</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a23 0%, #1a1a3e 50%, #2d1b69 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            color: white;
        }
        
        #container {
            width: 100%;
            height: 100vh;
            position: relative;
        }
        
        #info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            color: white;
            font-size: 14px;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 300px;
        }
        
        #controls {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            color: white;
            font-size: 12px;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        #node-info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            color: white;
            font-size: 13px;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: none;
            max-width: 250px;
        }
        
        .control-button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 12px;
            margin: 2px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
        }
        
        .control-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        
        .control-button.active {
            background: rgba(74, 144, 226, 0.6);
            border-color: rgba(74, 144, 226, 0.8);
        }
        
        canvas {
            display: block;
            cursor: grab;
        }
        
        canvas:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div id="info-panel">
        <h3>🌐 WebGL 3D Network</h3>
        <p><strong>Network Status:</strong> <span id="status">Active</span></p>
        <p><strong>Nodes:</strong> <span id="node-count">12</span></p>
        <p><strong>Connections:</strong> <span id="connection-count">17</span></p>
    </div>
    
    <div id="controls">
        <div>View Mode:</div>
        <button class="control-button active" onclick="setViewMode('sphere')">Sphere</button>
        <button class="control-button" onclick="setViewMode('grid')">Grid</button>
        <button class="control-button" onclick="setViewMode('random')">Random</button>
       
    </div>
    
    <div id="node-info">
        <h4 id="node-title">Node Information</h4>
        <p id="node-details">Click on a node to see details</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, controls;
        let nodes = [], connections = [], particles = [];
        let networkGroup, particleSystem;
        let isAnimating = true, showParticles = true;
        let currentViewMode = 'sphere';
        let selectedNode = null;
        let mouse = new THREE.Vector2();
        let raycaster = new THREE.Raycaster();
        
        // Network node data - added VPN and hotspot
        const nodeData = [
            { id: 'central', type: 'hub', color: 0x4A90E2, symbol: '🌐', name: 'Network Hub', size: 1.5 },
            { id: 'security', type: 'service', color: 0x5DADE2, symbol: '🔒', name: 'Security', size: 1.0 },
            { id: 'cloud', type: 'service', color: 0x85C1E9, symbol: '☁️', name: 'Cloud Services', size: 1.0 },
            { id: 'wifi', type: 'service', color: 0x3498DB, symbol: '📶', name: 'WiFi Network', size: 1.0 },
            { id: 'database', type: 'service', color: 0x5499C7, symbol: '🗄️', name: 'Database', size: 1.0 },
            { id: 'api', type: 'service', color: 0x7FB3D3, symbol: '🔗', name: 'API Gateway', size: 1.0 },
            { id: 'monitoring', type: 'service', color: 0xAED6F1, symbol: '📊', name: 'Monitoring', size: 1.0 },
            { id: 'vpn', type: 'service', color: 0x9B59B6, symbol: '🔐', name: 'VPN Server', size: 1.0 },
            { id: 'hotspot', type: 'service', color: 0xE67E22, symbol: '📡', name: 'Mobile Hotspot', size: 1.0 },
            { id: 'backup', type: 'support', color: 0xF7DC6F, symbol: '💾', name: 'Backup', size: 0.8 },
            { id: 'analytics', type: 'support', color: 0x82E0AA, symbol: '📈', name: 'Analytics', size: 0.8 },
            { id: 'firewall', type: 'support', color: 0xF1948A, symbol: '🛡️', name: 'Firewall', size: 0.8 }
        ];
        
        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x0a0a23, 50, 200);
            
            // Camera setup
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 30);
            
            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x0a0a23, 1);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('container').appendChild(renderer.domElement);
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 10, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            
            const pointLight = new THREE.PointLight(0x4A90E2, 1, 100);
            pointLight.position.set(0, 0, 0);
            scene.add(pointLight);
            
            // Network group
            networkGroup = new THREE.Group();
            scene.add(networkGroup);
            
            createNodes();
            createConnections();
            createParticleSystem();
            setupControls();
            setupEventListeners();
            
            animate();
        }
        
        function createNodes() {
            nodes = [];
            
            // Create invisible sphere wireframe for reference
            const sphereWireframe = new THREE.SphereGeometry(15, 16, 12);
            const wireframeMaterial = new THREE.WireframeGeometry(sphereWireframe);
            const wireframeMesh = new THREE.LineSegments(wireframeMaterial, new THREE.LineBasicMaterial({
                color: 0x333333,
                transparent: true,
                opacity: 0.1
            }));
            networkGroup.add(wireframeMesh);
            
            nodeData.forEach((data, index) => {
                // Create node geometry with higher detail for true 3D
                const geometry = new THREE.SphereGeometry(data.size, 64, 64);
                
                // Enhanced material with realistic 3D properties
                const material = new THREE.MeshPhongMaterial({
                    color: data.color,
                    emissive: data.color,
                    emissiveIntensity: 0.15,
                    shininess: 150,
                    transparent: true,
                    opacity: 0.95,
                    specular: 0xffffff,
                    reflectivity: 0.3
                });
                
                const node = new THREE.Mesh(geometry, material);
                node.castShadow = true;
                node.receiveShadow = true;
                
                // True 3D sphere positioning with golden ratio spiral
                if (data.id === 'central') {
                    node.position.set(0, 0, 0);
                } else {
                    const goldenRatio = (1 + Math.sqrt(5)) / 2;
                    const i = index - 1; // Exclude central node
                    const totalNodes = nodeData.length - 1;
                    
                    // Golden spiral distribution on sphere
                    const y = 1 - 2 * i / (totalNodes - 1);
                    const radiusAtY = Math.sqrt(1 - y * y);
                    const theta = 2 * Math.PI * i / goldenRatio;
                    const radius = 15 + (data.type === 'support' ? 3 : 0); // Support nodes further out
                    
                    node.position.x = radius * radiusAtY * Math.cos(theta);
                    node.position.y = radius * y;
                    node.position.z = radius * radiusAtY * Math.sin(theta);
                }
                
                // Multi-layer glow effect for true 3D depth
                const innerGlow = new THREE.SphereGeometry(data.size * 1.2, 32, 32);
                const innerGlowMaterial = new THREE.MeshBasicMaterial({
                    color: data.color,
                    transparent: true,
                    opacity: 0.15,
                    side: THREE.BackSide
                });
                const innerGlowMesh = new THREE.Mesh(innerGlow, innerGlowMaterial);
                node.add(innerGlowMesh);
                
                const outerGlow = new THREE.SphereGeometry(data.size * 1.5, 16, 16);
                const outerGlowMaterial = new THREE.MeshBasicMaterial({
                    color: data.color,
                    transparent: true,
                    opacity: 0.05,
                    side: THREE.BackSide
                });
                const outerGlowMesh = new THREE.Mesh(outerGlow, outerGlowMaterial);
                node.add(outerGlowMesh);
                
                // Add text label for nodes
                if (typeof document !== 'undefined') {
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.width = 256;
                    canvas.height = 128;
                    
                    context.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    context.font = '24px Arial';
                    context.textAlign = 'center';
                    context.fillText(data.symbol, 128, 64);
                    context.fillText(data.name, 128, 100);
                    
                    const texture = new THREE.CanvasTexture(canvas);
                    const spriteMaterial = new THREE.SpriteMaterial({ 
                        map: texture,
                        transparent: true,
                        opacity: 0.8
                    });
                    const sprite = new THREE.Sprite(spriteMaterial);
                    sprite.scale.set(4, 2, 1);
                    sprite.position.y = data.size + 2;
                    node.add(sprite);
                }
                
                // Store enhanced node data
                node.userData = {
                    ...data,
                    originalPosition: node.position.clone(),
                    originalScale: node.scale.clone(),
                    pulseOffset: Math.random() * Math.PI * 2,
                    rotationSpeed: {
                        x: (Math.random() - 0.5) * 0.02,
                        y: (Math.random() - 0.5) * 0.02,
                        z: (Math.random() - 0.5) * 0.02
                    }
                };
                
                nodes.push(node);
                networkGroup.add(node);
            });
        }
        
        function createConnections() {
            connections = [];
            const centralNode = nodes[0]; // Central hub
            
            // Find specific nodes by ID
            const wifiNode = nodes.find(node => node.userData.id === 'wifi');
            const hotspotNode = nodes.find(node => node.userData.id === 'hotspot');
            const vpnNode = nodes.find(node => node.userData.id === 'vpn');
            
            // Connect all nodes to central hub with curved connections
            for (let i = 1; i < nodes.length; i++) {
                const connection = createConnection(centralNode, nodes[i], true);
                connections.push(connection);
                networkGroup.add(connection);
            }
            
            // Create cross connections between nearby nodes on the sphere
            for (let i = 1; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const distance = nodes[i].position.distanceTo(nodes[j].position);
                    // Only connect nodes that are relatively close on the sphere
                    if (distance < 12 && Math.random() > 0.6) {
                        const connection = createConnection(nodes[i], nodes[j], false);
                        connections.push(connection);
                        networkGroup.add(connection);
                    }
                }
            }
            
            // Add specific connection between wifi and hotspot
            if (wifiNode && hotspotNode) {
                const wifiHotspotConnection = createConnection(wifiNode, hotspotNode, false);
                wifiHotspotConnection.material.color.setHex(0x00FF00); // Green color for special connection
                wifiHotspotConnection.material.opacity = 0.8;
                connections.push(wifiHotspotConnection);
                networkGroup.add(wifiHotspotConnection);
            }
            
            // Add some additional connections for VPN (security-focused)
            if (vpnNode) {
                const securityNode = nodes.find(node => node.userData.id === 'security');
                const firewallNode = nodes.find(node => node.userData.id === 'firewall');
                
                if (securityNode) {
                    const vpnSecurityConnection = createConnection(vpnNode, securityNode, false);
                    vpnSecurityConnection.material.color.setHex(0x9B59B6); // Purple color
                    vpnSecurityConnection.material.opacity = 0.7;
                    connections.push(vpnSecurityConnection);
                    networkGroup.add(vpnSecurityConnection);
                }
                
                if (firewallNode) {
                    const vpnFirewallConnection = createConnection(vpnNode, firewallNode, false);
                    vpnFirewallConnection.material.color.setHex(0x9B59B6); // Purple color
                    vpnFirewallConnection.material.opacity = 0.7;
                    connections.push(vpnFirewallConnection);
                    networkGroup.add(vpnFirewallConnection);
                }
            }
        }
        
        function createConnection(node1, node2, isCentralConnection = false) {
            const start = node1.position.clone();
            const end = node2.position.clone();
            
            // Create curved connection for 3D effect
            const curve = new THREE.CatmullRomCurve3([
                start,
                start.clone().lerp(end, 0.3).add(new THREE.Vector3(
                    (Math.random() - 0.5) * 3,
                    (Math.random() - 0.5) * 3,
                    (Math.random() - 0.5) * 3
                )),
                start.clone().lerp(end, 0.7).add(new THREE.Vector3(
                    (Math.random() - 0.5) * 3,
                    (Math.random() - 0.5) * 3,
                    (Math.random() - 0.5) * 3
                )),
                end
            ]);
            
            const points = curve.getPoints(50);
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            
            // Enhanced material based on connection type
            const material = new THREE.LineBasicMaterial({
                color: isCentralConnection ? 0x4A90E2 : 0x7FB3D3,
                transparent: true,
                opacity: isCentralConnection ? 0.8 : 0.4,
                linewidth: isCentralConnection ? 3 : 1
            });
            
            const line = new THREE.Line(geometry, material);
            
            // Add data flow particles along the connection
            const particleCount = 10;
            const particleGeometry = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);
            
            for (let i = 0; i < particleCount; i++) {
                const t = i / particleCount;
                const point = curve.getPoint(t);
                particlePositions[i * 3] = point.x;
                particlePositions[i * 3 + 1] = point.y;
                particlePositions[i * 3 + 2] = point.z;
            }
            
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            
            const particleMaterial = new THREE.PointsMaterial({
                color: isCentralConnection ? 0xffffff : 0x4A90E2,
                size: 0.3,
                transparent: true,
                opacity: 0.8
            });
            
            const dataFlow = new THREE.Points(particleGeometry, particleMaterial);
            line.add(dataFlow);
            
            line.userData = { 
                node1, 
                node2, 
                curve,
                dataFlow,
                isCentralConnection,
                animationOffset: Math.random() * Math.PI * 2
            };
            
            return line;
        }
        
        function createParticleSystem() {
            const particleCount = 500;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 100;
                positions[i3 + 1] = (Math.random() - 0.5) * 100;
                positions[i3 + 2] = (Math.random() - 0.5) * 100;
                
                colors[i3] = Math.random();
                colors[i3 + 1] = Math.random();
                colors[i3 + 2] = 1;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.3
            });
            
            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
        }
        
        function setupControls() {
            // Manual camera controls
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };
            
            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });
            
            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaMove = {
                        x: e.clientX - previousMousePosition.x,
                        y: e.clientY - previousMousePosition.y
                    };
                    
                    networkGroup.rotation.y += deltaMove.x * 0.005;
                    networkGroup.rotation.x += deltaMove.y * 0.005;
                    
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });
            
            renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
            });
            
            renderer.domElement.addEventListener('wheel', (e) => {
                camera.position.z += e.deltaY * 0.01;
                camera.position.z = Math.max(10, Math.min(50, camera.position.z));
            });
        }
        
        function setupEventListeners() {
            renderer.domElement.addEventListener('click', onNodeClick);
            window.addEventListener('resize', onWindowResize);
        }
        
        function onNodeClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes);
            
            if (intersects.length > 0) {
                selectNode(intersects[0].object);
            }
        }

        function selectNode(node) {
            // Reset previous selection
            if (selectedNode) {
                selectedNode.scale.copy(selectedNode.userData.originalScale);
                selectedNode.material.emissiveIntensity = 0.2;
            }
            
            selectedNode = node;
            
            // Highlight selected node
            node.scale.multiplyScalar(1.2);
            node.material.emissiveIntensity = 0.5;
            
            // Show node info
            const infoPanel = document.getElementById('node-info');
            document.getElementById('node-title').textContent = node.userData.name;
            document.getElementById('node-details').innerHTML = `
                <strong>Type:</strong> ${node.userData.type}<br>
                <strong>Status:</strong> Online<br>
                <strong>Connections:</strong> ${getNodeConnections(node)}<br>
                <strong>Load:</strong> ${Math.floor(Math.random() * 100)}%
            `;
            infoPanel.style.display = 'block';
        }
        
        function getNodeConnections(node) {
            return connections.filter(conn => 
                conn.userData.node1 === node || conn.userData.node2 === node
            ).length;
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (isAnimating) {
                // Rotate network group
                networkGroup.rotation.y += 0.005;
                
                // Animate nodes
                nodes.forEach((node, index) => {
                    const time = Date.now() * 0.001;
                    const pulseScale = 1 + Math.sin(time * 2 + node.userData.pulseOffset) * 0.1;
                    
                    if (node !== selectedNode) {
                        node.scale.setScalar(node.userData.size * pulseScale);
                    }
                    
                    // Update node material
                    node.material.emissiveIntensity = 0.2 + Math.sin(time * 3 + node.userData.pulseOffset) * 0.1;
                });
                
                // Animate connections
                connections.forEach(connection => {
                    const time = Date.now() * 0.001;
                    connection.material.opacity = 0.6 + Math.sin(time * 2) * 0.2;
                });
                
                // Animate particles
                if (showParticles && particleSystem) {
                    particleSystem.rotation.x += 0.001;
                    particleSystem.rotation.y += 0.002;
                }
            }
            
            renderer.render(scene, camera);
        }
        
        function setViewMode(mode) {
            currentViewMode = mode;
            
            // Update button states
            document.querySelectorAll('.control-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Animate to new positions
            nodes.forEach((node, index) => {
                if (node.userData.id === 'central') return;
                
                let newPosition;
                switch (mode) {
                    case 'sphere':
                        newPosition = node.userData.originalPosition.clone();
                        break;
                    case 'grid':
                        const gridSize = Math.ceil(Math.sqrt(nodes.length));
                        const x = (index % gridSize - gridSize / 2) * 8;
                        const y = (Math.floor(index / gridSize) - gridSize / 2) * 8;
                        newPosition = new THREE.Vector3(x, y, 0);
                        break;
                    case 'random':
                        newPosition = new THREE.Vector3(
                            (Math.random() - 0.5) * 30,
                            (Math.random() - 0.5) * 30,
                            (Math.random() - 0.5) * 30
                        );
                        break;
                }
                
                // Animate position change
                animateNodePosition(node, newPosition);
            });
            
            // Update connections
            setTimeout(() => {
                updateConnections();
            }, 1000);
        }
        
        function animateNodePosition(node, targetPosition) {
            const startPosition = node.position.clone();
            const duration = 1000;
            const startTime = Date.now();
            
            function update() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = easeInOutCubic(progress);
                
                node.position.lerpVectors(startPosition, targetPosition, eased);
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            update();
        }
        
        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1;
        }
        
        function updateConnections() {
            connections.forEach(connection => {
                const points = [];
                points.push(connection.userData.node1.position);
                points.push(connection.userData.node2.position);
                connection.geometry.setFromPoints(points);
            });
        }
        
        function toggleAnimation() {
            isAnimating = !isAnimating;
        }
        
        function toggleParticles() {
            showParticles = !showParticles;
            particleSystem.visible = showParticles;
        }
        
        function resetCamera() {
            camera.position.set(0, 0, 30);
            networkGroup.rotation.set(0, 0, 0);
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Initialize the application
        init();
    </script>
</body>
</html>
